<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quasar Electronics & Computers</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f8fafc;color:#1f2937}
nav{background:#0F172A;padding:15px;position:sticky;top:0}
nav a{color:white;text-decoration:none;margin:0 15px}
header{background:#2563EB;color:white;padding:80px 20px;text-align:center}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:40px}
.card{background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.15);cursor:pointer}
.card img{width:100%;height:180px;object-fit:cover}
.card h3{text-align:center;padding:15px}
#viewer{padding:30px;text-align:center}
#viewer img{max-width:90%;border-radius:12px;display:none}
footer{background:#0F172A;color:white;text-align:center;padding:20px}
</style>
<script>
function showImage(src,title){
 document.getElementById('largeImage').src=src;
 document.getElementById('largeImage').style.display='block';
 document.getElementById('title').innerText=title;
}
</script>
</head>
<body>
<nav>
<a href="#">Home</a>
<a href="#products">Products</a>
</nav>

<header>
<h1>Quasar Electronics & Computers</h1>
<p>Click any product to view it.</p>
</header>

<section id="products" class="products">
<div class="card" onclick="showImage('https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=1200','Business Laptops')">
<img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=600">
<h3>Business Laptops</h3>
</div>

<div class="card" onclick="showImage('https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=1200','CCTV Cameras')">
<img src="https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=600">
<h3>CCTV Cameras</h3>
</div>

<div class="card" onclick="showImage('https://images.unsplash.com/photo-1563986768609-322da13575f3?w=1200','Networking Equipment')">
<img src="https://images.unsplash.com/photo-1563986768609-322da13575f3?w=600">
<h3>Networking Equipment</h3>
</div>

<div class="card" onclick="showImage('https://images.unsplash.com/photo-1612815154858-60aa4c59eaa6?w=1200','Printers')">
<img src="https://images.unsplash.com/photo-1612815154858-60aa4c59eaa6?w=600">
<h3>Printers</h3>
</div>
</section>

<div id="viewer">
<h2 id="title">Select a Product</h2>
<img id="largeImage">
</div>

<footer>© 2026 Quasar Electronics & Computers</footer>
</body>
</html>
